<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 510" role="img" font-family="system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>x402 の 8 ステップ決済フロー</title>
<desc>クライアント・リソースサーバー・Facilitator・チェーン間の 2 往復フロー（①〜⑧）。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;}
.box-purple{fill:#EEEDFE;stroke:#534AB7;}
.box-teal{fill:#E1F5EE;stroke:#0F6E56;}
.th{font-size:14px;font-weight:500;}
.ts{font-size:12px;}
.t-gray-h{fill:#2C2C2A;}
.t-purple-h{fill:#3C3489;}
.t-teal-h{fill:#085041;}
.label{fill:#3d3d3a;font-size:12px;}
.muted{fill:#73726c;font-size:12px;}
.arr{fill:none;stroke:#73726c;stroke-width:1.5;}
</style>
</defs>

<rect x="20" y="20" width="130" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th t-gray-h" x="85" y="40" text-anchor="middle" dominant-baseline="central">クライアント</text>
<rect x="180" y="20" width="130" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th t-gray-h" x="245" y="40" text-anchor="middle" dominant-baseline="central">リソースサーバー</text>
<rect x="340" y="20" width="130" height="40" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th t-purple-h" x="405" y="40" text-anchor="middle" dominant-baseline="central">Facilitator</text>
<rect x="500" y="20" width="130" height="40" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th t-teal-h" x="565" y="40" text-anchor="middle" dominant-baseline="central">チェーン</text>

<line x1="85" y1="60" x2="85" y2="490" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.45"/>
<line x1="245" y1="60" x2="245" y2="490" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.45"/>
<line x1="405" y1="60" x2="405" y2="490" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.45"/>
<line x1="565" y1="60" x2="565" y2="490" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.45"/>

<text class="label" x="165" y="92" text-anchor="middle">① GET /products</text>
<line x1="85" y1="100" x2="245" y2="100" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="165" y="142" text-anchor="middle">② 402 + PaymentRequirements</text>
<line x1="245" y1="150" x2="85" y2="150" class="arr" marker-end="url(#arrow)"/>

<path d="M 85 195 L 135 195 L 135 215 L 85 215" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="label" x="140" y="200" text-anchor="start">③ EIP-712 署名</text>
<text class="muted" x="140" y="216" text-anchor="start">（オフチェーン・無料）</text>

<text class="label" x="165" y="262" text-anchor="middle">④ POST + PAYMENT-SIGNATURE</text>
<line x1="85" y1="270" x2="245" y2="270" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="325" y="312" text-anchor="middle">⑤ verify / settle</text>
<line x1="245" y1="320" x2="405" y2="320" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="485" y="362" text-anchor="middle">⑥ transferWithAuthorization</text>
<line x1="405" y1="370" x2="565" y2="370" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="325" y="412" text-anchor="middle">⑦ { success, tx hash }</text>
<line x1="405" y1="420" x2="245" y2="420" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="165" y="462" text-anchor="middle">⑧ 200 OK + PAYMENT-RESPONSE</text>
<line x1="245" y1="470" x2="85" y2="470" class="arr" marker-end="url(#arrow)"/>
</svg>

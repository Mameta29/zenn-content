<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 310" role="img" font-family="system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>x402 の登場人物と役割分担</title>
<desc>クライアントとリソースサーバーはチェーンに触れず、Facilitator のみがオンチェーンに接続する。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;}
.box-purple{fill:#EEEDFE;stroke:#534AB7;}
.box-teal{fill:#E1F5EE;stroke:#0F6E56;}
.th{font-size:14px;font-weight:500;}
.ts{font-size:12px;}
.t-gray-h{fill:#2C2C2A;}
.t-gray-s{fill:#5F5E5A;}
.t-purple-h{fill:#3C3489;}
.t-purple-s{fill:#534AB7;}
.t-teal-h{fill:#085041;}
.t-teal-s{fill:#0F6E56;}
.muted{fill:#73726c;font-size:12px;}
.arr{fill:none;stroke:#73726c;stroke-width:1.5;}
</style>
</defs>

<rect x="40" y="60" width="180" height="56" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th t-gray-h" x="130" y="78" text-anchor="middle" dominant-baseline="central">クライアント</text>
<text class="ts t-gray-s" x="130" y="98" text-anchor="middle" dominant-baseline="central">署名のみ／ガスなし</text>

<rect x="250" y="60" width="180" height="56" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="th t-gray-h" x="340" y="78" text-anchor="middle" dominant-baseline="central">リソースサーバー</text>
<text class="ts t-gray-s" x="340" y="98" text-anchor="middle" dominant-baseline="central">金額提示／チェーン非接触</text>

<rect x="460" y="60" width="180" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th t-purple-h" x="550" y="78" text-anchor="middle" dominant-baseline="central">Facilitator</text>
<text class="ts t-purple-s" x="550" y="98" text-anchor="middle" dominant-baseline="central">署名検証／ガス代行／送金</text>

<text class="muted" x="235" y="80" text-anchor="middle">HTTP</text>
<line x1="220" y1="88" x2="250" y2="88" stroke="#73726c" stroke-width="1.5" stroke-linecap="round"/>
<text class="muted" x="445" y="80" text-anchor="middle">HTTP</text>
<line x1="430" y1="88" x2="460" y2="88" stroke="#73726c" stroke-width="1.5" stroke-linecap="round"/>

<rect x="460" y="220" width="180" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th t-teal-h" x="550" y="238" text-anchor="middle" dominant-baseline="central">ブロックチェーン</text>
<text class="ts t-teal-s" x="550" y="258" text-anchor="middle" dominant-baseline="central">JPYC コントラクト (EVM)</text>

<line x1="550" y1="116" x2="550" y2="220" class="arr" marker-end="url(#arrow)"/>
<text class="ts t-purple-s" x="544" y="168" text-anchor="end">transferWithAuthorization</text>

<text class="muted" x="40" y="170" text-anchor="start">※ Facilitator のみがチェーンに接触する</text>
<text class="muted" x="40" y="188" text-anchor="start">　唯一のオンチェーン・アクター</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 620" role="img" font-family="system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>verify の 7 つのチェックの流れ</title>
<desc>0〜6 の 7 つのチェックを順に実行する。Check 6 のみ RPC 失敗時はソフトフェイル。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;}
.box-blue{fill:#E6F1FB;stroke:#185FA5;}
.box-amber{fill:#FAEEDA;stroke:#854F0B;}
.th{font-size:14px;font-weight:500;fill:#3d3d3a;}
.ts{font-size:12px;fill:#5F5E5A;}
.th-blue{fill:#0C447C;}
.ts-blue{fill:#185FA5;}
.th-amber{fill:#633806;}
.ts-amber{fill:#854F0B;}
.arr{fill:none;stroke:#73726c;stroke-width:1.5;}
</style>
</defs>

<rect x="265" y="20" width="150" height="36" rx="18" class="box-gray" stroke-width="0.5"/>
<text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central">/verify 受信</text>
<line x1="340" y1="56" x2="340" y2="76" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="76" width="350" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="94" text-anchor="middle" dominant-baseline="central">Check 0: requirements 整合性</text>
<text class="ts ts-blue" x="340" y="114" text-anchor="middle" dominant-baseline="central">scheme / network / amount / asset / payTo</text>
<line x1="340" y1="132" x2="340" y2="152" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="152" width="350" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="170" text-anchor="middle" dominant-baseline="central">Check 1: 署名リカバリ</text>
<text class="ts ts-blue" x="340" y="190" text-anchor="middle" dominant-baseline="central">EIP-712 ＋ high-s 拒否</text>
<line x1="340" y1="208" x2="340" y2="228" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="228" width="350" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="246" text-anchor="middle" dominant-baseline="central">Check 2: 残高</text>
<text class="ts ts-blue" x="340" y="266" text-anchor="middle" dominant-baseline="central">balanceOf(from) ≥ value</text>
<line x1="340" y1="284" x2="340" y2="304" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="304" width="350" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="322" text-anchor="middle" dominant-baseline="central">Check 3: 金額・受取人</text>
<text class="ts ts-blue" x="340" y="342" text-anchor="middle" dominant-baseline="central">value と payTo の一致確認</text>
<line x1="340" y1="360" x2="340" y2="380" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="380" width="350" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="398" text-anchor="middle" dominant-baseline="central">Check 4: 時間ウィンドウ</text>
<text class="ts ts-blue" x="340" y="418" text-anchor="middle" dominant-baseline="central">validAfter ≤ now &lt; validBefore</text>
<line x1="340" y1="436" x2="340" y2="456" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="456" width="350" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="474" text-anchor="middle" dominant-baseline="central">Check 5: simulate</text>
<text class="ts ts-blue" x="340" y="494" text-anchor="middle" dominant-baseline="central">eth_call で擬似実行</text>
<line x1="340" y1="512" x2="340" y2="532" class="arr" marker-end="url(#arrow)"/>

<rect x="165" y="532" width="350" height="56" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="th th-amber" x="340" y="550" text-anchor="middle" dominant-baseline="central">Check 6: nonce 消費済み（リプレイ）</text>
<text class="ts ts-amber" x="340" y="570" text-anchor="middle" dominant-baseline="central">authorizationState(from, nonce)</text>

<text class="ts" x="340" y="608" text-anchor="middle">青 = ハードフェイル ／ 橙 = Check 6 のみ RPC 失敗時はソフトフェイル（素通り＋ログ）</text>
</svg>

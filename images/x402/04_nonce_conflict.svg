<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 400" role="img" font-family="system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>nonce 競合：直列化なし vs あり</title>
<desc>直列化なしでは 2 件が同じ nonce N を読み 2 件目が revert する。直列化ありでは Mutex/DO により N → N+1 と順に採番される。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;}
.box-amber{fill:#FAEEDA;stroke:#854F0B;}
.box-teal{fill:#E1F5EE;stroke:#0F6E56;}
.box-red{fill:#FCEBEB;stroke:#A32D2D;}
.box-purple{fill:#EEEDFE;stroke:#534AB7;}
.th{font-size:14px;font-weight:500;fill:#3d3d3a;}
.ts{font-size:12px;fill:#5F5E5A;}
.muted{fill:#73726c;}
.arr{fill:none;stroke:#73726c;stroke-width:1.5;}
</style>
</defs>

<text class="th" x="160" y="35" text-anchor="middle">直列化なし</text>
<text class="th" x="510" y="35" text-anchor="middle">直列化あり</text>

<line x1="340" y1="20" x2="340" y2="380" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<rect x="40" y="60" width="110" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="ts" x="95" y="80" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">settle #1</text>
<rect x="180" y="60" width="110" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="ts" x="235" y="80" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">settle #2</text>

<line x1="95" y1="100" x2="95" y2="130" class="arr" marker-end="url(#arrow)"/>
<line x1="235" y1="100" x2="235" y2="130" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="130" width="110" height="40" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="95" y="150" text-anchor="middle" dominant-baseline="central" fill="#633806">nonce N を読む</text>
<rect x="180" y="130" width="110" height="40" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="235" y="150" text-anchor="middle" dominant-baseline="central" fill="#633806">nonce N を読む</text>

<line x1="95" y1="170" x2="95" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="235" y1="170" x2="235" y2="200" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="200" width="110" height="40" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="95" y="220" text-anchor="middle" dominant-baseline="central" fill="#633806">tx (nonce=N)</text>
<rect x="180" y="200" width="110" height="40" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="235" y="220" text-anchor="middle" dominant-baseline="central" fill="#633806">tx (nonce=N)</text>

<line x1="95" y1="240" x2="95" y2="270" class="arr" marker-end="url(#arrow)"/>
<line x1="235" y1="240" x2="235" y2="270" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="270" width="110" height="40" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="ts" x="95" y="290" text-anchor="middle" dominant-baseline="central" fill="#085041">✓ 成功</text>
<rect x="180" y="270" width="110" height="40" rx="8" class="box-red" stroke-width="0.5"/>
<text class="ts" x="235" y="290" text-anchor="middle" dominant-baseline="central" fill="#791F1F">✗ revert</text>

<text class="ts muted" x="160" y="340" text-anchor="middle">同じ nonce のため 2 件目が失敗</text>

<rect x="380" y="60" width="110" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="ts" x="435" y="80" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">settle #1</text>
<rect x="530" y="60" width="110" height="40" rx="8" class="box-gray" stroke-width="0.5"/>
<text class="ts" x="585" y="80" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">settle #2</text>

<path d="M 435 100 L 475 128" class="arr" marker-end="url(#arrow)"/>
<path d="M 585 100 L 545 128" class="arr" marker-end="url(#arrow)"/>

<rect x="420" y="130" width="180" height="44" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th" x="510" y="148" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Mutex / Durable Object</text>
<text class="ts" x="510" y="166" text-anchor="middle" dominant-baseline="central" fill="#534AB7">チェーンごとに直列化</text>

<line x1="510" y1="174" x2="510" y2="200" class="arr" marker-end="url(#arrow)"/>
<rect x="420" y="200" width="180" height="40" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="510" y="220" text-anchor="middle" dominant-baseline="central" fill="#633806">#1 → tx (nonce=N)</text>

<line x1="510" y1="240" x2="510" y2="266" class="arr" marker-end="url(#arrow)"/>
<rect x="420" y="266" width="180" height="40" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="ts" x="510" y="286" text-anchor="middle" dominant-baseline="central" fill="#633806">#2 → tx (nonce=N+1)</text>

<line x1="510" y1="306" x2="510" y2="332" class="arr" marker-end="url(#arrow)"/>
<rect x="420" y="332" width="180" height="40" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="ts" x="510" y="352" text-anchor="middle" dominant-baseline="central" fill="#085041">両方 ✓ 成功</text>
</svg>

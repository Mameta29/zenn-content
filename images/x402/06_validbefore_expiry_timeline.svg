<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 290" role="img" font-family="system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>validBefore 期限切れの時系列</title>
<desc>verify 時点は validBefore 内だが、HTTP 往復・署名・DO ロック待ちで時間が経過し、実ブロードキャスト時には validBefore を超過する。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.th{font-size:14px;font-weight:500;}
.ts{font-size:12px;}
.muted{fill:#73726c;}
.danger{fill:#A32D2D;}
.danger-d{fill:#791F1F;}
.success-d{fill:#085041;}
.amber-d{fill:#854F0B;}
.arr{fill:none;stroke:#73726c;stroke-width:1.5;}
</style>
</defs>

<line x1="490" y1="40" x2="490" y2="250" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 4"/>
<text class="ts danger" x="490" y="32" text-anchor="middle">validBefore</text>

<rect x="40" y="200" width="450" height="14" fill="#9FE1CB" opacity="0.55"/>
<rect x="490" y="200" width="150" height="14" fill="#F09595" opacity="0.55"/>

<text class="ts success-d" x="265" y="194" text-anchor="middle">有効期間（authorization 内）</text>
<text class="ts danger-d" x="565" y="194" text-anchor="middle">期限切れ</text>

<line x1="40" y1="207" x2="640" y2="207" stroke="#73726c" stroke-width="1"/>
<text class="ts muted" x="640" y="232" text-anchor="end">time →</text>

<line x1="70" y1="200" x2="70" y2="214" stroke="#73726c" stroke-width="1.5"/>
<text class="ts success-d" x="70" y="232" text-anchor="middle">verify ✓</text>
<text class="ts muted" x="70" y="250" text-anchor="middle">（now ≪ validBefore）</text>

<line x1="140" y1="200" x2="140" y2="214" stroke="#73726c" stroke-width="1.5"/>
<text class="ts muted" x="140" y="232" text-anchor="middle">HTTP+署名+POST</text>

<path d="M 145 170 L 530 170" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round"/>
<line x1="145" y1="162" x2="145" y2="178" stroke="#BA7517" stroke-width="2"/>
<line x1="530" y1="162" x2="530" y2="178" stroke="#BA7517" stroke-width="2"/>
<text class="ts amber-d" x="337" y="155" text-anchor="middle">DO ロック待ち（他の settle のキューに後続）</text>

<line x1="550" y1="200" x2="550" y2="214" stroke="#A32D2D" stroke-width="2"/>
<text class="ts danger" x="550" y="232" text-anchor="middle">broadcast ✗</text>
<text class="ts danger-d" x="550" y="250" text-anchor="middle">authorization is expired</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 320" role="img" font-family="system-ui, -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>エラー分類の Before/After</title>
<desc>Before ではガス枯渇・コントラクト revert・その他がすべて unexpected_settle_error に落ちていたが、After ではそれぞれ専用コードに分岐する。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;}
.box-red{fill:#FCEBEB;stroke:#A32D2D;}
.box-teal{fill:#E1F5EE;stroke:#0F6E56;}
.th{font-size:14px;font-weight:500;fill:#3d3d3a;}
.ts{font-size:12px;fill:#5F5E5A;}
.t-gray{fill:#2C2C2A;}
.t-red{fill:#791F1F;}
.t-teal{fill:#085041;}
.muted{fill:#73726c;font-size:12px;}
.arr{fill:none;stroke:#73726c;stroke-width:1.5;}
</style>
</defs>

<text class="th" x="155" y="32" text-anchor="middle">Before</text>
<text class="th" x="500" y="32" text-anchor="middle">After</text>

<line x1="305" y1="20" x2="305" y2="305" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<rect x="20" y="70" width="120" height="40" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="ts t-gray" x="80" y="90" text-anchor="middle" dominant-baseline="central">ガス枯渇</text>
<rect x="20" y="125" width="120" height="40" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="ts t-gray" x="80" y="139" text-anchor="middle" dominant-baseline="central">コントラクト</text>
<text class="ts t-gray" x="80" y="155" text-anchor="middle" dominant-baseline="central">revert</text>
<rect x="20" y="180" width="120" height="40" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="ts t-gray" x="80" y="200" text-anchor="middle" dominant-baseline="central">その他</text>

<path d="M 140 90 L 175 140" class="arr" marker-end="url(#arrow)"/>
<line x1="140" y1="145" x2="175" y2="145" class="arr" marker-end="url(#arrow)"/>
<path d="M 140 200 L 175 150" class="arr" marker-end="url(#arrow)"/>

<rect x="175" y="125" width="120" height="40" rx="6" class="box-red" stroke-width="0.5"/>
<text class="ts t-red" x="235" y="139" text-anchor="middle" dominant-baseline="central">unexpected_</text>
<text class="ts t-red" x="235" y="155" text-anchor="middle" dominant-baseline="central">settle_error</text>

<text class="muted" x="155" y="255" text-anchor="middle">すべて「その他いろいろ」</text>
<text class="muted" x="155" y="273" text-anchor="middle">バケットに落ちる</text>

<rect x="320" y="70" width="130" height="40" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="ts t-gray" x="385" y="90" text-anchor="middle" dominant-baseline="central">ガス枯渇</text>
<rect x="320" y="125" width="130" height="40" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="ts t-gray" x="385" y="139" text-anchor="middle" dominant-baseline="central">コントラクト</text>
<text class="ts t-gray" x="385" y="155" text-anchor="middle" dominant-baseline="central">revert</text>
<rect x="320" y="180" width="130" height="40" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="ts t-gray" x="385" y="200" text-anchor="middle" dominant-baseline="central">その他</text>

<line x1="450" y1="90" x2="475" y2="90" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="145" x2="475" y2="145" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="200" x2="475" y2="200" class="arr" marker-end="url(#arrow)"/>

<rect x="475" y="70" width="185" height="40" rx="6" class="box-teal" stroke-width="0.5"/>
<text class="ts t-teal" x="567" y="83" text-anchor="middle" dominant-baseline="central">facilitator_insufficient_</text>
<text class="ts t-teal" x="567" y="99" text-anchor="middle" dominant-baseline="central">native_balance</text>
<rect x="475" y="125" width="185" height="40" rx="6" class="box-teal" stroke-width="0.5"/>
<text class="ts t-teal" x="567" y="138" text-anchor="middle" dominant-baseline="central">authorization_expired</text>
<text class="ts t-teal" x="567" y="154" text-anchor="middle" dominant-baseline="central">など専用コード</text>
<rect x="475" y="180" width="185" height="40" rx="6" class="box-red" stroke-width="0.5"/>
<text class="ts t-red" x="567" y="200" text-anchor="middle" dominant-baseline="central">unexpected_settle_error</text>

<text class="muted" x="490" y="255" text-anchor="middle">運用者が次に取るべき</text>
<text class="muted" x="490" y="273" text-anchor="middle">アクションが一意に読める</text>
</svg>
